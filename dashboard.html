<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="protectPage()">

<nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashboard.html">FinanceTracker</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="income.html">Income</a></li>
        <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        <li class="nav-item ms-2"><button class="btn btn-danger btn-sm" onclick="logout()">
        Logout</button> </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <h3>Dashboard</h3>

  <div class="row">
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Total Income</h5>
        <h3>RM 5,000</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Total Expenses</h5>
        <h3>RM 3,300</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Balance</h5>
        <h3>RM 2,700</h3>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <canvas id="financeChart"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
