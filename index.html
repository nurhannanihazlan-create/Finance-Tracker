<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<link rel="stylesheet" href="css/style.css">

<nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashboard.html">FinanceTracker</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="income.html">Income</a></li>
        <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        <li class="nav-item ms-2"><button class="btn btn-danger btn-sm" onclick="logout()">
        Logout</button> </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <h3 class="text-center mb-3">Login</h3>

      <form onsubmit="login(event)">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">

        <p id="errorMsg"></p>

        <button class="btn btn-primary w-100">Login</button>
      </form>

      <p class="mt-3 text-center">
        No account? <a href="register.html">Register</a>
      </p>

    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
